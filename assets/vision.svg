<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Soft golden radial glow for the core -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F3E5AB" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#D4AF37" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Linear gradient for the orbits to simulate depth/light -->
    <linearGradient id="orbitGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E0A3" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#AA7C11" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background Canvas -->
  <rect width="800" height="800" fill="none" />

  <g transform="translate(400, 400)">
    <!-- 1. Central Glowing Core Sphere -->
    <circle cx="0" cy="0" r="160" fill="url(#coreGlow)" />
    
    <!-- 2. Concentric Wave Rings (fading outwards) -->
    <circle cx="0" cy="0" r="185" fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-dasharray="1 3" opacity="0.4" />
    <circle cx="0" cy="0" r="215" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3" />
    <circle cx="0" cy="0" r="250" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-dasharray="6 4" opacity="0.2" />
    <circle cx="0" cy="0" r="290" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.15" />
    <circle cx="0" cy="0" r="335" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.1" />

    <!-- 3. Primary Diagonal Orbits (Ellipses) -->
    <!-- Orbit 1 (Tilted Left) -->
    <ellipse cx="0" cy="0" rx="300" ry="110" fill="none" stroke="url(#orbitGold)" stroke-width="1.8" transform="rotate(-30)" />
    <!-- Orbit 2 (Tilted Right) -->
    <ellipse cx="0" cy="0" rx="300" ry="110" fill="none" stroke="url(#orbitGold)" stroke-width="1.8" transform="rotate(30)" />
    <!-- Orbit 3 (Vertical Axis) -->
    <ellipse cx="0" cy="0" rx="300" ry="115" fill="none" stroke="url(#orbitGold)" stroke-width="1.5" transform="rotate(90)" opacity="0.7" />
    <!-- Orbit 4 (Horizontal Axis) -->
    <ellipse cx="0" cy="0" rx="320" ry="100" fill="none" stroke="url(#orbitGold)" stroke-width="1.2" opacity="0.5" />

    <!-- 4. Constellation Nodes (Connected Dots) -->
    <g opacity="0.7">
      <!-- Left-side network nodes -->
      <line x1="-240" y1="120" x2="-170" y2="150" stroke="#D4AF37" stroke-width="1" opacity="0.4" />
      <line x1="-170" y1="150" x2="-100" y2="110" stroke="#D4AF37" stroke-width="1" opacity="0.4" />
      <circle cx="-240" cy="120" r="4" fill="#D4AF37" />
      <circle cx="-170" cy="150" r="5" fill="#F5E0A3" />
      <circle cx="-100" cy="110" r="6" fill="#888" opacity="0.6" />
      <circle cx="-250" cy="-30" r="5" fill="#888" opacity="0.5" />

      <!-- Right-side network nodes -->
      <line x1="150" y1="160" x2="210" y2="100" stroke="#D4AF37" stroke-width="1" opacity="0.5" />
      <line x1="210" y1="100" x2="280" y2="80" stroke="#D4AF37" stroke-width="1" opacity="0.5" />
      <circle cx="150" cy="160" r="6" fill="#888" opacity="0.7" />
      <circle cx="210" cy="100" r="4.5" fill="#F5E0A3" />
      <circle cx="280" cy="80" r="5" fill="#D4AF37" />
    </g>

    <!-- 5. Scattered Floating Particles / Electrons -->
    <circle cx="310" cy="-70" r="5" fill="#888" opacity="0.4" />
    <circle cx="150" cy="-170" r="4.5" fill="#888" opacity="0.3" />
    <circle cx="-150" cy="-220" r="3" fill="#D4AF37" opacity="0.5" />
  </g>
</svg>

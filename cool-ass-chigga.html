<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
</head>
<body>
    <style>
        .uber{
            background-color: black;
            color: white;
            height: 35px;
            margin: 40px;
            align-items: center;
            padding-left: 15px;
            padding-right: 15px;
            transition: opacity 0.15s;
        }
        .uber:hover{
            opacity: 0.7;
        }
        .bootstrap{
            background-color: rgb(121,82,179);
            color: white;
            font-weight: bold;
            height: 35px;
            border-radius: 10px;
            border-style: none;
            padding: 10px;
            margin-right: 10px;
            transition: background-color 0.15s;
        }
        .bootstrap:hover{
            background-color: rgb(99, 68, 146);
            
        }
        .bootstrap-down{
            color: rgb(108, 117,125);
            background-color: white;
            border-color: rgb(125, 116, 116);
            border-style: solid;
            font-weight: bold;
            height: 35px;
            border-radius: 10px;
            padding-top: 10px ;
            padding-bottom: 10px;
            transition: background-color 0.15s, color 0.15s;
            
            
        }
        .bootstrap-down:hover{
            background-color:rgb(108, 117,125) ;
            color: white;
        }
    </style>
    <button class="uber">Request now</button>
    <button class="bootstrap">Get started</button>
    <button class="bootstrap-down">Download</button>

</body>
</html>
